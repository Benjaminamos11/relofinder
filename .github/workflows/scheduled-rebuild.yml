name: Scheduled Rebuild

# Rebuild the site daily at 3 AM UTC to fetch latest data from Supabase
on:
  schedule:
    # Run at 3 AM UTC every day (cron format: minute hour day month weekday)
    - cron: '0 3 * * *'

  # Allow manual triggering from GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger-netlify-build:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify Deploy
        run: |
          curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}

      - name: Log rebuild
        run: |
          echo "✅ Netlify rebuild triggered at $(date)"
          echo "This ensures company data is fresh from Supabase"
